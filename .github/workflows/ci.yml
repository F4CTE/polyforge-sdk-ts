name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Build & Test
    runs-on: [self-hosted, polyforge-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          dest: C:\pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: pnpm install --frozen-lockfile --store-dir C:\pnpm-store
      - run: pnpm build
      - run: pnpm test
